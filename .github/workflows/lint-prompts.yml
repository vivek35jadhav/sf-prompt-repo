name: Lint Prompts

on:
  pull_request:
    paths:
      - "prompts/**"
      - "scripts/validate-prompts.py"
  push:
    branches: [main]
    paths:
      - "prompts/**"
      - "scripts/validate-prompts.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate prompt structure
        run: python3 scripts/validate-prompts.py
